# simplemon configuration file
# Default location: /etc/simplemon/simplemon.yaml

listen:
  address: "127.0.0.1"   # IP to bind (use 0.0.0.0 for all interfaces)
  port: 8095

interfaces:
  include:
    - ".*"               # monitor all interfaces (regexp)
    # - "eth.*"
    # - "ens.*"
    # - "^lo$"

collector:
  interval_seconds: 3
  retention_seconds: 1800  # 30 min

# Regular widgets (optional)
widgets:
  - name: "Open file descriptors"
    type: graph
    command: "cat /proc/sys/fs/file-nr | awk '{print $1}'"
    interval_seconds: 5
    unit: "fd"

  - name: "Disk usage"
    type: text
    command: "df -h"

# Watchers (optional)
#
# A watcher runs check_command on a schedule, inspects its exit code,
# and dispatches to the matching action. All actions of one watcher
# share a single widget on the dashboard.
#
# Exit code flow:
#   check_command exits 0  → run action with exit_code: 0
#   check_command exits 1  → run action with exit_code: 1
#   check_command exits N  → run action with exit_code: N
#   no matching action     → widget shows "unexpected exit code: N"
#   check_command fails    → widget shows "check_command failed: <error>"
#
# widget_type: text   — full stdout of the action command, up to 200 lines
# widget_type: graph  — first line of stdout parsed as float64, stored in
#                       a ring buffer (same depth as retention_seconds)
#
# Examples:
#
watchers:
  - name: "Disk health"
    check_command: "df / | awk 'NR==2{gsub(/%/,\"\",$5); exit ($5 > 90) ? 2 : ($5 > 75) ? 1 : 0}'"
    interval_seconds: 60
    actions:
      - exit_code: 0
        command: "echo 'OK'"
        widget_type: text
      - exit_code: 1
        command: "df -h"
        widget_type: text
      - exit_code: 2
        command: "df -h && echo '--- du top10 ---' && du -sh /* 2>/dev/null | sort -rh | head -10"
        widget_type: text

