# simplemon configuration file
# Default location: /etc/simplemon/simplemon.yaml

listen:
  address: "127.0.0.1"
  port: 8095

interfaces:
  include:
    - ".*"

collector:
  interval_seconds: 3
  retention_seconds: 1800

widgets:
  - name: "Open file descriptors"
    type: graph
    command: "cat /proc/sys/fs/file-nr | awk '{print $1}'"
    interval_seconds: 5
    unit: "fd"

  - name: "Disk usage"
    type: text
    command: "df -h"
